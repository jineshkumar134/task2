<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actionable Plans</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Quill Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #e8f2ff 100%);
            padding: 40px 20px;
            color: #2c3e50;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header-subtitle {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .form-content {
            padding: 50px;
            background: linear-gradient(to bottom, #ffffff 0%, #fafbfc 100%);
        }

        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35 0%, #2563eb 100%);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .actionable-container {
            margin-bottom: 50px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
        }

        .actionable-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .actionable-title {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .actionable-number {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
            flex-shrink: 0;
        }

        .actionable-title-input {
            flex: 1;
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            padding: 10px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            background: white;
        }

        .actionable-title-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-delete-actionable {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            flex-shrink: 0;
        }

        .btn-delete-actionable:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .actionable-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e8ecf0;
        }

        .actionable-table thead {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
        }

        .actionable-table th {
            padding: 15px 10px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
            vertical-align: top;
        }

        .actionable-table th .step-subtitle {
            display: block;
            font-size: 14px;
            font-weight: 500;
            font-style: italic;
            margin-top: 5px;
            opacity: 0.9;
            text-transform: none;
        }

        .actionable-table td {
            padding: 15px;
            border: 1px solid #e8ecf0;
            vertical-align: top;
        }

        .actionable-table tbody tr:hover {
            background: #f8fafc;
        }

        .step-content {
            background: white;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            min-height: 200px;
        }

        .step-content.focused {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .ql-toolbar {
            background: #f8fafc;
            border: none !important;
            border-bottom: 1px solid #e8ecf0 !important;
        }

        .ql-container {
            border: none !important;
            font-family: 'Poppins', sans-serif;
            font-size: 17px;
            min-height: 150px;
        }

        .ql-editor {
            min-height: 150px;
            padding: 14px 18px;
            font-size: 17px;
        }

        .ql-editor.ql-blank::before {
            color: #94a3b8;
            font-style: normal;
            font-size: 17px;
        }

        .btn-add-actionable {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add-actionable:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid #34d399;
            color: #065f46;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 50px;
            padding-top: 40px;
            border-top: 2px solid #e8ecf0;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.4);
        }

        .btn-reset {
            background: white;
            color: #4a5568;
            border: 2px solid #e8ecf0;
        }

        .btn-reset:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }

        .preview-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .preview-content {
            position: relative;
            background: white;
            margin: 2% auto;
            padding: 40px;
            width: 95%;
            max-width: 1400px;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            font-family: 'Poppins', sans-serif;
        }

        .preview-actions {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn-print {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .close-preview {
            background: #ef4444;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }

        .close-preview:hover {
            background: #dc2626;
            transform: rotate(90deg);
        }

        .floating-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff6b35 0%, #2563eb 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            font-size: 14px;
            display: none;
        }

        /* Print Styles */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }

            body {
                background: white;
                padding: 0;
            }

            .header, .button-group, .btn-add-actionable, 
            .floating-indicator, .preview-actions, 
            .close-preview, .progress-bar, .btn-delete-actionable {
                display: none !important;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }

            .form-content {
                padding: 0;
                background: white;
            }

            .actionable-container {
                page-break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
                margin-bottom: 20px;
            }

            .actionable-table {
                page-break-inside: avoid;
            }

            .actionable-table th {
                background: #2563eb !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .ql-toolbar {
                display: none !important;
            }

            .step-content {
                border: 1px solid #ddd;
            }

            .preview-modal {
                position: relative;
                display: block !important;
                background: white;
            }

            .preview-content {
                box-shadow: none;
                max-height: none;
                margin: 0;
                width: 100%;
                padding: 20px;
                overflow: visible;
            }
        }

        @media (max-width: 768px) {
            .form-content {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .table-container {
                overflow-x: scroll;
            }

            .actionable-title {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 ACTIONABLE PLANS</h1>
            <p class="header-subtitle">Strategic Action Plans with 6-Step Framework</p>
        </div>

        <div class="form-content">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div id="successMessage" class="success-message">
                ✓ Actionable Plan saved successfully!
            </div>

            <form id="actionableForm">
                <div id="actionablesContainer">
                    <!-- Actionable plans will be added here -->
                </div>

                <button type="button" class="btn-add-actionable" onclick="addActionable()">
                    + Add New Actionable Plan
                </button>

                <!-- Button Group -->
                <div class="button-group">
                    <button type="reset" class="btn btn-reset" onclick="return confirmReset()">Reset Form</button>
                    <button type="button" class="btn btn-secondary" onclick="showPreview()">Preview Plans</button>
                    <button type="submit" class="btn btn-primary">Save Plans</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-content">
            <div class="preview-actions">
                <button class="btn-print" onclick="window.print()">🖨 Print</button>
                <button class="close-preview" onclick="closePreview()">×</button>
            </div>
            <div id="previewBody"></div>
        </div>
    </div>

    <div class="floating-indicator" id="floatingIndicator">💾 Auto-saving...</div>

    <!-- Quill Editor JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let actionableCounter = 0;
        const editors = {};

        // Initialize with one default actionable
        window.addEventListener('DOMContentLoaded', function() {
            addActionable('Parents are active partners in the educational journey of their child');
        });

        function addActionable(title = '') {
            actionableCounter++;
            const container = document.getElementById('actionablesContainer');
            const actionableId = `actionable-${actionableCounter}`;
            
            const actionableBlock = document.createElement('div');
            actionableBlock.className = 'actionable-container';
            actionableBlock.id = actionableId;
            
            actionableBlock.innerHTML = `
                <div class="actionable-header">
                    <div class="actionable-title">
                        <div class="actionable-number">${actionableCounter}</div>
                        <input type="text" class="actionable-title-input" 
                               placeholder="Enter Actionable Title" 
                               value="${title}">
                    </div>
                    <button type="button" class="btn-delete-actionable" onclick="deleteActionable('${actionableId}')">
                        Delete Actionable
                    </button>
                </div>
                
                <div class="table-container">
                    <table class="actionable-table">
                        <thead>
                            <tr>
                                <th style="width: 16.67%;">
                                    STEP 1
                                    <span class="step-subtitle">Where are we now?</span>
                                </th>
                                <th style="width: 16.67%;">
                                    STEP 2
                                    <span class="step-subtitle">What do we need to do in the coming year?</span>
                                </th>
                                <th style="width: 16.67%;">
                                    STEP 3
                                    <span class="step-subtitle">How will we achieve what we want to do?</span>
                                </th>
                                <th style="width: 16.67%;">
                                    STEP 4
                                    <span class="step-subtitle">Who is responsible?</span>
                                </th>
                                <th style="width: 16.67%;">
                                    STEP 5
                                    <span class="step-subtitle">What is the timeline?</span>
                                </th>
                                <th style="width: 16.67%;">
                                    STEP 6
                                    <span class="step-subtitle">What will the impact look like?</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="step-content" id="step1-${actionableId}-container">
                                        <div id="step1-${actionableId}"></div>
                                    </div>
                                </td>
                                <td>
                                    <div class="step-content" id="step2-${actionableId}-container">
                                        <div id="step2-${actionableId}"></div>
                                    </div>
                                </td>
                                <td>
                                    <div class="step-content" id="step3-${actionableId}-container">
                                        <div id="step3-${actionableId}"></div>
                                    </div>
                                </td>
                                <td>
                                    <div class="step-content" id="step4-${actionableId}-container">
                                        <div id="step4-${actionableId}"></div>
                                    </div>
                                </td>
                                <td>
                                    <div class="step-content" id="step5-${actionableId}-container">
                                        <div id="step5-${actionableId}"></div>
                                    </div>
                                </td>
                                <td>
                                    <div class="step-content" id="step6-${actionableId}-container">
                                        <div id="step6-${actionableId}"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            
            container.appendChild(actionableBlock);
            
            // Initialize Quill editors for all 6 steps
            for (let i = 1; i <= 6; i++) {
                const editorId = `step${i}-${actionableId}`;
                const containerId = `${editorId}-container`;
                initializeEditor(editorId, containerId);
            }
            
            updateProgress();
        }

        function initializeEditor(editorId, containerId) {
            const quill = new Quill(`#${editorId}`, {
                theme: 'snow',
                placeholder: 'Enter content (use "-" for bullet points)...',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['clean']
                    ]
                }
            });

            const container = document.getElementById(containerId);
            quill.on('selection-change', function(range) {
                if (range) {
                    container.classList.add('focused');
                } else {
                    container.classList.remove('focused');
                }
            });

            editors[editorId] = quill;
            
            quill.on('text-change', updateProgress);
            
            return quill;
        }

        function deleteActionable(actionableId) {
            if (confirm('Are you sure you want to delete this entire actionable plan?')) {
                // Remove editors from the editors object
                for (let i = 1; i <= 6; i++) {
                    const editorKey = `step${i}-${actionableId}`;
                    if (editors[editorKey]) {
                        delete editors[editorKey];
                    }
                }
                
                document.getElementById(actionableId).remove();
                renumberActionables();
                updateProgress();
            }
        }

        function renumberActionables() {
            const actionables = document.querySelectorAll('.actionable-container');
            actionables.forEach((actionable, index) => {
                const numberBadge = actionable.querySelector('.actionable-number');
                if (numberBadge) {
                    numberBadge.textContent = index + 1;
                }
            });
        }

        // Preview functionality
        function showPreview() {
            const modal = document.getElementById('previewModal');
            const previewBody = document.getElementById('previewBody');
            
            let previewHTML = '<h1 style="text-align:center;color:#2c3e50;margin-bottom:30px;font-family:Poppins;">ACTIONABLE PLANS</h1>';
            previewHTML += '<p style="text-align:center;color:#64748b;margin-bottom:40px;font-family:Poppins;">Strategic Action Plans with 6-Step Framework</p>';
            
            // Get all actionable containers
            const actionables = document.querySelectorAll('.actionable-container');
            
            actionables.forEach((actionable, index) => {
                const titleInput = actionable.querySelector('.actionable-title-input');
                const title = titleInput ? titleInput.value : '';
                
                previewHTML += `
                    <div style="margin-bottom:40px;border:2px solid #e8ecf0;border-radius:12px;padding:20px;page-break-inside:avoid;">
                        <div style="display:flex;align-items:center;gap:15px;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #f0f0f0;">
                            <div style="width:50px;height:50px;background:#ff6b35;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">${index + 1}</div>
                            <div style="font-size:18px;font-weight:700;color:#2c3e50;">${title || 'Untitled Actionable'}</div>
                        </div>
                        <table style="width:100%;border-collapse:collapse;border:2px solid #e8ecf0;">
                            <thead>
                                <tr style="background:#2563eb;color:white;">
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 1<br><span style="font-weight:normal;font-style:italic;font-size:14px;">Where are we now?</span>
                                    </th>
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 2<br><span style="font-weight:normal;font-style:italic;font-size:14px;">What do we need to do?</span>
                                    </th>
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 3<br><span style="font-weight:normal;font-style:italic;font-size:14px;">How will we achieve?</span>
                                    </th>
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 4<br><span style="font-weight:normal;font-style:italic;font-size:14px;">Who is responsible?</span>
                                    </th>
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 5<br><span style="font-weight:normal;font-style:italic;font-size:14px;">What is the timeline?</span>
                                    </th>
                                    <th style="padding:12px;border:1px solid rgba(255,255,255,0.2);text-align:center;font-size:16px;">
                                        STEP 6<br><span style="font-weight:normal;font-style:italic;font-size:14px;">What will the impact look like?</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>`;
                
                // Get content for each step
                for (let i = 1; i <= 6; i++) {
                    const stepId = actionable.id;
                    const editorKey = `step${i}-${stepId}`;
                    let content = '';
                    
                    if (editors[editorKey]) {
                        content = editors[editorKey].root.innerHTML;
                    }
                    
                    previewHTML += `
                        <td style="padding:12px;border:1px solid #e8ecf0;vertical-align:top;">
                            <div style="min-height:100px;font-size:16px;line-height:1.6;">${content}</div>
                        </td>`;
                }
                
                previewHTML += `
                                </tr>
                            </tbody>
                        </table>
                    </div>`;
            });
            
            previewBody.innerHTML = previewHTML;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target === modal) closePreview();
        }

        // Form submission
        document.getElementById('actionableForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 4000);
        });

        function confirmReset() {
            return confirm('Are you sure you want to reset the entire form? All data will be lost.');
        }

        // Auto-save indicator
        let autoSaveTimeout;
        document.addEventListener('input', function(e) {
            clearTimeout(autoSaveTimeout);
            const indicator = document.getElementById('floatingIndicator');
            indicator.style.display = 'block';
            autoSaveTimeout = setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        });

        // Progress tracking
        function updateProgress() {
            const titleInputs = document.querySelectorAll('.actionable-title-input');
            let filled = 0;
            
            titleInputs.forEach(input => {
                if (input.value.trim() !== '') filled++;
            });
            
            Object.keys(editors).forEach(key => {
                if (editors[key] && editors[key].getText().trim().length > 0) filled++;
            });
            
            const totalFields = titleInputs.length + Object.keys(editors).length;
            const percentage = totalFields > 0 ? (filled / totalFields) * 100 : 0;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        document.addEventListener('input', updateProgress);
        updateProgress();
    </script>
</body>
</html>
